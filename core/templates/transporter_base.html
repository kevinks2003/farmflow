{# templates/transporter_base.html #}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}Transporter | FarmFlow{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --bg-1: #0f692dff;      /* deep forest */
      --bg-2: #04220f;
      --glass-bg: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.08);
      --accent: #22c55e;    /* bright green */
      --muted: #93a5a1;
      --card-shadow: 0 12px 30px rgba(0,0,0,0.6);
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #0c130eff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      min-height: 100%;
    }

    /* NAVBAR */
    .navbar {
      background: linear-gradient(90deg, rgba(8,129,65,0.95), rgba(20,120,70,0.95));
      box-shadow: 0 8px 30px rgba(2,8,5,0.6);
    }

    .navbar-brand, .nav-link, .dropdown-item {
      color: #56d26fff !important;
    }

    .nav-link.active {
      font-weight: 600;
      text-decoration: underline;
    }

    /* Content container */
    .content {
      max-width: 1200px;
      margin: 28px auto;
      padding: 1.25rem;
    }

    /* Glass panel */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 1rem;
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(8px) saturate(120%);
      -webkit-backdrop-filter: blur(8px) saturate(120%);
      color: #e7f7ee;
    }

    /* Page header */
    .page-hero {
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .hero-title {
      font-weight: 700;
      font-size: 1.4rem;
      margin: 0;
    }

    .hero-sub {
      color: var(--muted);
      margin: 0.25rem 0 0;
    }

    /* Card grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    /* Transporter cards - static style */
    .transport-card {
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: var(--card-shadow);
      transition: box-shadow 0.3s ease;
    }

    .transport-card:hover {
      box-shadow: 0 0 25px rgba(34,197,94,0.25);
    }

    .transport-card .inner-content {
      padding: 16px;
    }

    /* Table inside cards */
    .glass .table thead th {
      background: rgba(255,255,255,0.03);
      color: #dff7e9;
      border-bottom: 0;
    }

    .glass .badge {
      font-weight: 600;
    }

    /* Buttons */
    .btn-accent {
      background: linear-gradient(90deg, var(--accent), #16a34a);
      border: none;
      color: #062011;
      font-weight: 700;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .btn-accent:hover {
      background: #15803d;
      color: #fff;
      transform: translateY(-2px);
    }

    .btn-outline-accent {
      border-radius: 10px;
      border-color: rgba(255,255,255,0.1);
      color: #dff7e9;
    }

    /* Responsive tweaks */
    @media (max-width: 768px) {
      .page-hero {
        flex-direction: column;
        align-items: flex-start;
        gap: .6rem;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'transporter_dashboard' %}">
        <i class="bi bi-truck"></i> FarmFlow Transport
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarNav" aria-controls="navbarNav"
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'transporter_dashboard' %}">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'logout' %}">
              <i class="bi bi-box-arrow-right"></i> Logout
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="container content">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
