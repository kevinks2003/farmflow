<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}FarmFlow{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg,#e9f7ff 0%, #d9f0ff 50%, #f7fbff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 0;
    }
    .card {
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(18, 38, 63, 0.08);
    }
    /* tighten input-group button */
    .input-group .btn-toggle-password {
      border-left: 0;
    }
    .form-label-small {
      font-size: .95rem;
    }
    @media (max-width: 576px) {
      body { padding: 1rem 0; }
    }
  </style>
</head>
<body>
  {% block content %}{% endblock %}

  <!-- Bootstrap JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Password toggle logic: finds all buttons with data-target -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.btn-toggle-password').forEach(function(btn){
        btn.addEventListener('click', function (e) {
          const targetId = btn.getAttribute('data-target');
          if (!targetId) return;
          const input = document.getElementById(targetId);
          if (!input) return;

          const icon = btn.querySelector('i');
          if (input.type === 'password') {
            input.type = 'text';
            if (icon) { icon.classList.remove('bi-eye'); icon.classList.add('bi-eye-slash'); }
          } else {
            input.type = 'password';
            if (icon) { icon.classList.remove('bi-eye-slash'); icon.classList.add('bi-eye'); }
          }

          // keep focus on input after toggle (good UX on mobile)
          input.focus();
        });
      });
    });
  </script>
</body>
</html>
