<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Transport Update</title>
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .box { border: 1px solid #ddd; padding: 16px; border-radius: 8px; }
        h2 { color: #28a745; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🚚 Order Update</h2>
        <p>Hi {{ buyer.username }},</p>
        <p>Your order <strong>#{{ order.id }}</strong> has been updated by the transporter <strong>{{ transporter.username }}</strong>.</p>
        <p><strong>Status:</strong> {{ status }}</p>
        <p>We’ll notify you about further progress.</p>
        <p>Thanks for using <strong>FarmFlow</strong> 🌱</p>
    </div>
</body>
</html>
