<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FarmFlow - Home</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --accent-green: #22c55e;
      --accent-green-dark: #16a34a;
    }

    html,body { height:100%; margin:0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; color:#fff; }

    .hero {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
      background: url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
    }

    .hero::before {
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, rgba(2,6,23,0.55), rgba(2,20,10,0.55));
      z-index:1;
    }

    /* Floating gradient shadow effect */
    .moving-shadow {
      position: absolute;
      width: 120%;
      height: 120%;
      background: radial-gradient(circle at center, rgba(34,197,94,0.25), transparent 70%);
      filter: blur(80px);
      animation: moveShadow 12s infinite ease-in-out;
      z-index: 0;
    }
    @keyframes moveShadow {
      0%   { transform: translate(-20%, -10%) scale(1); }
      50%  { transform: translate(20%, 10%) scale(1.1); }
      100% { transform: translate(-20%, -10%) scale(1); }
    }

    .navbar {
      position:absolute;
      top:0;
      left:0;
      right:0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:1rem 2rem;
      z-index:30;
    }
    .logo { color: var(--accent-green); font-weight:800; font-size:1.4rem; }
    .nav-links a {
      color:#fff;
      margin-left:1.25rem;
      text-decoration:none;
      font-weight:600;
    }
    .nav-links a:hover { color: var(--accent-green); }

    .btn-cta {
      background: linear-gradient(90deg,var(--accent-green),var(--accent-green-dark));
      color:#080808;
      padding:10px 22px;
      border-radius:32px;
      font-weight:700;
      box-shadow: 0 10px 28px rgba(34,197,94,0.18);
      border:none;
    }

    /* Big title */
    .hero-title {
      font-size: clamp(72px, 14vw, 220px);
      font-weight: 900;
      letter-spacing: 10px;
      color: rgba(255,255,255,0.25);
      text-transform:uppercase;
      line-height:0.95;
      margin:0;
      z-index:10;
      text-align:center;
      user-select:none;
      pointer-events:none;
      text-shadow: 0 0 40px rgba(34,197,94,0.4);
    }

    .hero-content {
      position:relative;
      z-index:40;
      text-align:center;
      max-width:920px;
      padding:1rem;
      margin-top:1rem;
    }
    .hero-sub {
      color: rgba(237,242,247,0.92);
      font-size:1.15rem;
      margin: 1rem auto 1.5rem;
    }

    .plant-img {
      position:absolute;
      top:50%;
      left:50%;
      transform: translate(-50%,-50%);
      z-index:25;
      pointer-events:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .plant-svg {
      max-height: 420px;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
      animation: float 4.5s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }

    @media (max-width:768px) {
      .hero-sub { padding: 0 1rem; font-size:1rem; }
      .plant-svg { max-height:300px; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">🌱 FarmFlow</div>
    <div class="nav-links">
      <a href="{% url 'register' %}">Register</a>
      <a href="{% url 'login' %}">Login</a>
    </div>
  </div>

  <!-- Hero -->
  <section class="hero">
    <div class="moving-shadow"></div>

    <h1 class="hero-title">FARM FLOW</h1>

    <!-- Plant SVG -->
    <div class="plant-img" aria-hidden="true">
      <svg class="plant-svg" viewBox="0 0 240 360" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#66ff9b"/>
            <stop offset="1" stop-color="#16a34a"/>
          </linearGradient>
          <linearGradient id="g2" x1="0" x2="1">
            <stop offset="0" stop-color="#9ee7b8"/>
            <stop offset="1" stop-color="#34d399"/>
          </linearGradient>
        </defs>
        <ellipse cx="120" cy="236" rx="80" ry="12" fill="#2b1b12" opacity="0.85"/>
        <path d="M120 230 C118 170, 120 160, 124 120 C128 84, 118 44, 140 24"
              fill="none" stroke="url(#g1)" stroke-width="6" stroke-linecap="round"/>
        <path d="M120 175 C92 160, 64 144, 64 112 C64 88, 100 96, 120 128"
              fill="url(#g2)" stroke="#0c7a32" stroke-width="1.2"/>
        <path d="M132 152 C158 140, 188 122, 198 92 C200 76, 166 86, 140 116"
              fill="url(#g2)" stroke="#0a6f2e" stroke-width="1.2"/>
        <circle cx="140" cy="30" r="6" fill="#8ff1b5"/>
      </svg>
    </div>

    <div class="hero-content">
      <p class="hero-sub">
        FarmFlow connects farmers, buyers and transporters to make crop trading seamless and sustainable.
      </p>
      <div>
        <a href="{% url 'register' %}" class="btn btn-cta">Get Started</a>
      </div>
    </div>

  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
