<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Buyer Dashboard{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.18);
      --accent: #34d399;
      --muted: #9ca3af;
    }

    html, body { height: 100%; margin: 0; }

    body {
      background: linear-gradient(160deg, #0f692dff 0%, #0c2414 100%);
      color: #f9fafb;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .navbar {
      background: rgba(25, 135, 84, 0.95);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6);
    }

    .navbar-brand, .nav-link {
      color: #fff !important;
    }

    .nav-link.active {
      font-weight: 600;
      text-decoration: underline;
    }

    .content-wrapper {
      padding: 2rem;
      max-width: 1200px;
      margin: 2rem auto;
    }

    /* Card style with 360° rotation */
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      backdrop-filter: blur(8px) saturate(120%);
      -webkit-backdrop-filter: blur(8px) saturate(120%);
      color: #fff;
      transform-style: preserve-3d;
      transition: transform 1.5s ease-in-out, box-shadow 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: rotateY(360deg);
      box-shadow: 0 0 35px rgba(255, 255, 255, 0.35),
                  0 0 60px rgba(255, 255, 255, 0.15);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: radial-gradient(circle at center, rgba(255,255,255,0.25), transparent 70%);
      opacity: 0;
      transition: opacity 0.6s ease;
      z-index: -1;
    }

    .card:hover::before { opacity: 1; }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-top-left-radius: 14px;
      border-top-right-radius: 14px;
      transition: transform 0.6s ease;
    }

    .card:hover img { transform: scale(1.05); }

    .card-body { padding: 1rem; color: #e5e5e5; }
    .card-title { font-weight: 700; color: #fff; }
    .text-muted { color: #9ca3af !important; }

    .btn-custom {
      border-radius: 50px;
      padding: 0.5rem 1.2rem;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(52, 211, 153, 0.3);
      background: var(--accent);
      color: #000;
      border: none;
      transition: all 0.3s ease;
    }

    .btn-custom:hover {
      background: #10b981;
      color: #fff;
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .cart-count {
      background: #ef4444;
      color: #fff;
      font-size: 0.8rem;
      padding: 2px 6px;
      border-radius: 50%;
      vertical-align: top;
      margin-left: -10px;
    }

    @media (max-width: 768px) {
      .content-wrapper { padding: 1.25rem; }
    }
  </style>
</head>

<body>
  {% if messages %}
    <div class="container mt-3">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="{% url 'buyer_crop_list' %}">🌾 FarmFlow Buyer</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav align-items-center">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'buyer_crop_list' %}"><i class="bi bi-basket"></i> View Crops</a>
          </li>
          <li class="nav-item position-relative">
            <a class="nav-link" href="{% url 'view_cart' %}">
              <i class="bi bi-cart"></i> My Cart
              {% if request.user.cart %}
                <span class="cart-count">{{ request.user.cart.items.count }}</span>
              {% endif %}
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'buyer_orders' %}"><i class="bi bi-box-seam"></i> Orders</a>
          </li>
          <li class="nav-item ms-2">
            <a class="btn btn-light btn-custom" href="{% url 'logout' %}"><i class="bi bi-box-arrow-right"></i> Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container content-wrapper">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
